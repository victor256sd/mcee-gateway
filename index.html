<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
          margin: 0;
        }

    .iframe-container {
        padding-left: 20px;
        padding-right: 20px;
        width: 100%;
        box-sizing: border-box;
    }
    
    .iframe-container iframe {
        width: 100%;
        height: 100%;
        display: block;
    }    
    </style>    
</head>


<!-- <head><link rel="stylesheet" href="style.css"></head> -->
<div class="iframe-container">
    <iframe
        src="https://integrity-ai.streamlit.app/?embed=true"
        width="100%"
        height="100%"
        frameborder="0"
        allowfullscreen
    ></iframe>
</div>
