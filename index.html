<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>

<style>
    html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; /* Disables browser-level scrolling completely */
  }
  
  .st-iframe-container {
    position: relative;
    width: 100%;
    /* max-width: 1200px; */ /* Optional: Sets a maximum width for desktop view */
    height: 100vh;      /* Sets the height relative to the mobile viewport */
    overflow: hidden;
    display: block;
  }

  .st-iframe-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    overflow-y: auto; /* Forces vertical scroll inside the iframe */
    -webkit-overflow-scrolling: touch; /* Fixes inertia-scroll lag on iOS Safari */
  }
</style>

<!-- Paste the HTML block where you want to embed the application -->
<div class="st-iframe-container">
    <iframe src="https://integrity-ai.streamlit.app/?embed=true" style="width: 100%; min-width: 100%; max-width: 100%; height: 100vh; border: none;"
    scrolling="yes">
    </iframe>
</div>
