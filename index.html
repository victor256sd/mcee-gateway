<!DOCTYPE html>

<style>
.responsive-iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    overflow: hidden;
}
.iframe-container {
    position: absolute;
    width: 100%;
    height: 100vh; /* Full viewport height */
    overflow: hidden;
    padding: 0;
    z-index:999999;
    display: none;
}
</style>
