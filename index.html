<style>
  .st-iframe-container {
    position: relative;
    width: 100%;
    max-width: 1200px; /* Optional: Sets a maximum width for desktop view */
    height: 90vh;      /* Sets the height relative to the mobile viewport */
    overflow: hidden;
  }

  .st-iframe-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
</style>

<div class="st-iframe-container">
    <iframe src="https://integrity-ai.streamlit.app/?embed=true"></iframe>
</div>
