
<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
    .iframe-container {
        position: relative;
        width: 100%;
        padding-bottom: 100%; /* Adjust as needed for aspect ratio */
        height: 0;
        overflow: hidden;
    }
    .iframe-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
    }
</style>
</head>    

<body>
<div class="iframe-container">
    <iframe src="https://integrity-ai.streamlit.app/?embed=true"></iframe>
</div>
</body>
