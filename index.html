<style>
  /* This container acts as a viewport window cutting off the bottom frame */
  .iframe-mask-wrapper {
    position: relative;
    width: 100%;
    height: 100vh;          /* Desired visible height */
    overflow: hidden;      /* Clips anything outside bounds */
    border: 1px solid #333333; /* Color this border to match your website theme */
  }

  .iframe-mask-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    /* We make the iframe taller than the container to hide the bottom bar */
    height: calc(100% + 46px); 
    border: none;
  }
</style>

<!-- Paste the HTML block where you want to embed the application -->
<div class="st-iframe-container">
    <iframe src="https://integrity-ai.streamlit.app/?embed=true" style="width: 100%; min-width: 100%; max-width: 100%; height: 80vh; border: none;"
    scrolling="yes">
    </iframe>
</div>
