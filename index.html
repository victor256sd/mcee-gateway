<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
          margin: 0;
        }

        .iframe-container (
          position: relative;
          width: 100%;
          padding-bottom: 100%;
          height: 0;
        )
        
        .iframe-container iframe {
          position: absolute;
          top: 0;
          left: 0;
          width: 90%;
          height: 100%;
          border: none;
        }
        
        iframe {
          display: block;
          background: #ffffff;
          border: none;
        }
        </style>    

</head>
<body>
  <div class="wrapper">
    <div class="hidefooter"></div>
    <iframe src="https://integrity-ai.streamlit.app/?embed=true">
        <p>Your browser doesn't support iframes</p>
    </iframe>
    </div>
</body>
</html>
